<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>脳科学ゼミナール 事前学習サイト｜講演アシスタント</title>
<meta name="description" content="東山高等学校 脳科学ゼミナールの事前学習サイト。専門用語辞典、AIチャット、講演中メモなどで予習・当日・復習をサポートします。">
<meta name="theme-color" content="#2C5FAA">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <span class="logo">脳科学ゼミナール</span>
    <div class="header-search">
      <span>🔍</span>
      <input type="search" id="header-search-input" placeholder="専門用語を検索" aria-label="専門用語を検索">
    </div>
  </header>

  <main id="app" role="main"></main>

  <nav id="nav" aria-label="下部ナビゲーション"></nav>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById("header-search-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const q = e.target.value.trim();
        if (q) location.hash = "#/search?q=" + encodeURIComponent(q);
      }
    });
  </script>
</body>
</html>
